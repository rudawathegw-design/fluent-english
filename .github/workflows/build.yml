name: build

# Push a tag like v1.0.0 to build + publish a release (APK + OTA bundle).
# Or run manually (workflow_dispatch) to get a test APK as an artifact.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(node -p "require('./www/build.json').contentVersion")"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version $V"

      - name: Stamp content version into the bundle
        run: |
          node -e "const f='www/build.json',fs=require('fs');const j=require('./'+f);j.contentVersion='${{ steps.ver.outputs.version }}';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode signing keystore (if configured)
        id: ks
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$GITHUB_WORKSPACE/android/app/release.keystore"
            echo "have=1" >> "$GITHUB_OUTPUT"
          else
            echo "have=0" >> "$GITHUB_OUTPUT"
            echo "No keystore secret found — building a debug-signed APK (fine for testing/sideload)."
          fi

      - name: Build APK
        working-directory: android
        env:
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ "${{ steps.ks.outputs.have }}" = "1" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$PWD/app/release.keystore" \
              -Pandroid.injected.signing.store.password="$STORE_PASS" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASS"
            echo "APK_PATH=$(ls app/build/outputs/apk/release/*.apk | head -1)" >> "$GITHUB_ENV"
          else
            ./gradlew assembleDebug
            echo "APK_PATH=$(ls app/build/outputs/apk/debug/*.apk | head -1)" >> "$GITHUB_ENV"
          fi

      - name: Package APK + OTA bundle
        id: pkg
        run: |
          V="${{ steps.ver.outputs.version }}"
          cp "android/$APK_PATH" "fluent-$V.apk"
          ( cd www && zip -qr "../fluent-www-$V.zip" . )
          SHA=$(sha256sum "fluent-www-$V.zip" | cut -d' ' -f1)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          node tools/make-version.js "$V" "fluent-www-$V.zip" "$SHA" "Fluent $V" > version.json
          echo "--- version.json ---"; cat version.json

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Fluent ${{ steps.ver.outputs.version }}
          files: |
            fluent-${{ steps.ver.outputs.version }}.apk
            fluent-www-${{ steps.ver.outputs.version }}.zip
            version.json
          body: |
            Fluent ${{ steps.ver.outputs.version }}

            Install the APK to update native code; content updates arrive over-the-air inside the app.

            sha256:${{ steps.pkg.outputs.sha }}

      - name: Upload build artifacts (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: fluent-${{ steps.ver.outputs.version }}
          path: |
            fluent-*.apk
            fluent-www-*.zip
            version.json
          retention-days: 7
