name: generate-keystore

# One-off helper: creates an Android signing keystore in the cloud (no local Java needed).
# Run from the Actions tab, download the artifact, then add the 4 secrets it tells you to.
# A STABLE keystore lets future APKs install over old ones — back it up safely.
on:
  workflow_dispatch:
    inputs:
      alias:
        description: "Key alias"
        required: true
        default: "fluent"
      dname:
        description: "Certificate identity"
        required: true
        default: "CN=Fluent, O=Fluent, C=IQ"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore
        run: |
          STOREPASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "${{ inputs.alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STOREPASS" -keypass "$STOREPASS" \
            -dname "${{ inputs.dname }}"
          base64 -w0 release.keystore > keystore.base64.txt
          {
            echo "Add these as repository secrets (Settings → Secrets and variables → Actions):"
            echo ""
            echo "ANDROID_KEY_ALIAS=${{ inputs.alias }}"
            echo "ANDROID_KEYSTORE_PASSWORD=$STOREPASS"
            echo "ANDROID_KEY_PASSWORD=$STOREPASS"
            echo "ANDROID_KEYSTORE_BASE64=(paste the full contents of keystore.base64.txt)"
          } > secrets.txt
          echo "::notice::Keystore generated. Download the 'keystore-bundle' artifact, then add the 4 secrets in secrets.txt."

      - uses: actions/upload-artifact@v4
        with:
          name: keystore-bundle
          path: |
            keystore.base64.txt
            secrets.txt
          retention-days: 1
